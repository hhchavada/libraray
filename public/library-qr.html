<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library QR Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #93c5fd 100%);
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 420px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
      text-align: center;
    }
    .header {
      background: #1e3a8a;
      color: #fff;
      padding: 24px;
    }
    .header h1 { font-size: 1.25rem; margin-bottom: 6px; }
    .header p { font-size: 0.875rem; opacity: 0.9; }
    .content { padding: 28px 24px 32px; }
    .qr-wrap {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .qr-wrap img {
      display: block;
      width: 260px;
      height: 260px;
    }
    .hint {
      color: #374151;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .subhint {
      color: #6b7280;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }
    .badge {
      display: inline-block;
      background: #ecfdf5;
      color: #047857;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 280px;
      padding: 14px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .download-btn:hover { background: #1d4ed8; }
    .loading, .invalid-qr {
      padding: 48px 24px;
      color: #6b7280;
      text-align: center;
    }
    .invalid-qr { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="app">
      <div class="loading">Loading QR code...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const libraryId = params.get('libraryId');
    const qrCodeId = params.get('qrCodeId');
    const apiBase = window.location.origin + '/api/v1/public';
    const app = document.getElementById('app');

    function showError(msg) {
      app.innerHTML = '<div class="invalid-qr"><h2>Invalid QR Link</h2><p>' + msg + '</p></div>';
    }

    function renderQr(library) {
      const qrImageUrl = apiBase + '/scan/qr-image?libraryId=' + encodeURIComponent(libraryId)
        + '&qrCodeId=' + encodeURIComponent(qrCodeId) + '&v=2';
      const qrSvgUrl = apiBase + '/scan/qr-svg?libraryId=' + encodeURIComponent(libraryId)
        + '&qrCodeId=' + encodeURIComponent(qrCodeId);
      const safeName = (library.libraryName || 'library').replace(/[^\w\-]+/g, '-').toLowerCase();
      const fileName = safeName + '-qr-' + qrCodeId + '.svg';

      app.innerHTML = [
        '<div class="header">',
        '<h1>', library.libraryName, '</h1>',
        '<p>', (library.address || ''), '</p>',
        '</div>',
        '<div class="content">',
        '<span class="badge">Permanent QR — never expires</span>',
        '<div class="qr-wrap">',
        '<img src="', qrImageUrl, '" alt="Library registration QR code" />',
        '</div>',
        '<p class="hint">Students scan this QR to open the registration form.</p>',
        '<p class="subhint">Print this page or show it on screen. This QR stays valid permanently.</p>',
        '<a class="download-btn" href="', qrSvgUrl, '" download="', fileName, '">Download QR (SVG)</a>',
        '</div>'
      ].join('');
    }

    async function init() {
      if (!libraryId || !qrCodeId) {
        showError('Missing library details. Please use a valid QR share link.');
        return;
      }

      try {
        const url = apiBase + '/scan/library?libraryId=' + encodeURIComponent(libraryId)
          + '&qrCodeId=' + encodeURIComponent(qrCodeId);
        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'This QR link is not valid.');
          return;
        }

        renderQr(data.data);
      } catch (err) {
        showError('Could not load QR code. Check your connection.');
      }
    }

    init();
  </script>
</body>
</html>
